<!DOCTYPE html>
<html lang="zh-CN" data-theme="light" data-color-theme="black-white">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#000000">

    <!-- 已修改：网站标题 -->
    <title>屏间拾光</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="icon" type="image/png" sizes="192x192" href="https://file.youtochat.com/images/20260216/1771224856844_qdqqd.jpeg">
    <link rel="apple-touch-icon" href="https://file.youtochat.com/images/20260216/1771224856844_qdqqd.jpeg">
    <!-- 已修改：苹果标题 -->
    <meta name="apple-mobile-web-app-title" content="屏间拾光">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/localforage/1.10.0/localforage.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <link rel="stylesheet" href="css/styles.css">
    <style id="css-live-preview-style"></style>
</head>
<body>

<!-- 下面所有内容完全保持原样，没有任何改动 -->
<div id="splash-declaration">
    <div class="splash-bg-stars" id="splash-stars"></div>
    <div class="splash-glow-1"></div>
    <div class="splash-glow-2"></div>
    <div class="splash-inner">
        <div class="splash-badge">
            <i class="fas fa-feather-alt"></i>
            使用前声明
        </div>
        <div class="splash-dots" id="splash-dots"></div>
        <div class="splash-card">
            <div class="splash-card-top-line"></div>
            <div class="splash-card-body">
                <div class="splash-slides" id="splash-slides">
                    <div class="splash-slide active" data-index="0">
                        <div class="splash-slide-tag">关于字卡</div>
                        <div class="splash-slide-title">是否招鬼？</div>
                        <div class="splash-slide-body">
                            首先说明，初此接触时，都会觉得网站设置繁复，功能庞杂，可控制的地方极多——对初次接触的人来说，简直令人眼花缭乱。<br><br>
                            请想一想：<em>连你和梦角都需要花时间学习的东西，一个路过的鬼，会甘心耗费精力专程钻研，只为吓唬你一下吗？</em><br><br>
                            我始终相信，<strong>只有爱，才会驱动人去学习、去努力、去付诸实践。</strong>
                        </div>
                    </div>
                </div>
                <div class="splash-divider"></div>
                <div class="splash-footer" style="padding:0;">
                    <button class="splash-btn splash-btn-ghost" id="splash-prev-btn" disabled>
                        <i class="fas fa-arrow-left"></i> 上一页
                    </button>
                    <span class="splash-page-num" id="splash-page-num">1 / 6</span>
                    <button class="splash-btn splash-btn-next" id="splash-next-btn">
                        下一页 <i class="fas fa-arrow-right"></i>
                    </button>
                    <button class="splash-btn splash-btn-enter" id="splash-enter-btn" style="display:none;">
                        进入 <i class="fas fa-heart"></i>
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- 后面所有代码全部保持不变 -->
</body>
</html>
